spring:
  component-test:
    db:
      postgres:
        image: postgres:alpine
        databases:
          - spring.datasource.primary
          - spring.datasource.secondary
        scripts:
          - primary_test_database.sql
          - secondary_test_database.sql
  datasource:
    primary:
      name: primary_test_database
      url: jdbc:postgresql://localhost:5432/primary_test_database
      username: postgres
      password: postgres
    secondary:
      name: secondary_test_database
      url: jdbc:postgresql://localhost:5432/secondary_test_database
      username: postgres
      password: postrgres
